{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 mb-5">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 fw-bold">編輯收支紀錄</h5>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('records.update_record', record_id=record.id) }}" method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="type" class="form-label">收支類型 <span class="text-danger">*</span></label>
                            <select class="form-select" id="type" name="type" required>
                                <option value="expense" {% if record.type == 'expense' %}selected{% endif %}>支出 (Expense)</option>
                                <option value="income" {% if record.type == 'income' %}selected{% endif %}>收入 (Income)</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="date" class="form-label">日期 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="date" name="date" value="{{ record.date }}" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="amount" class="form-label">金額 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" class="form-control" id="amount" name="amount" min="0" value="{{ record.amount }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="category" class="form-label">分類</label>
                            <input type="text" class="form-control" id="category" name="category" value="{{ record.category }}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="description" class="form-label">描述</label>
                        <textarea class="form-control" id="description" name="description" rows="2">{{ record.description }}</textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('records.index') }}" class="btn btn-light me-md-2">取消</a>
                        <button type="submit" class="btn btn-primary">更新紀錄</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
