{% extends "base.html" %}
{% block content %}
<div class="auth-card" style="margin-top: 1vmin;">
    <h3 class="fw-bold mb-4">編輯食譜 📝</h3>
    <form method="POST" action="{{ url_for('recipe.edit_recipe', id=recipe.id) }}">
        <div class="mb-3">
            <label class="form-label fw-bold">食譜名稱</label>
            <input type="text" name="title" class="form-control" value="{{ recipe.title }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">關聯食材</label>
            <input type="text" name="ingredients" class="form-control" value="{{ ingredients }}">
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">詳細步驟</label>
            <textarea name="steps" class="form-control" rows="6" required>{{ recipe.steps }}</textarea>
        </div>
        <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" name="is_public" id="is_public" {% if recipe.is_public %}checked{% endif %}>
            <label class="form-check-label" for="is_public">設為公開食譜</label>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-custom px-4">儲存變更</button>
            <a href="{{ url_for('recipe.detail', id=recipe.id) }}" class="btn btn-outline-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
