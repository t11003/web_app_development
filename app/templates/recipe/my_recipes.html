{% extends "base.html" %}
{% block content %}
<h3 class="fw-bold mb-4">我的食譜庫</h3>
<div class="list-group">
    {% for r in recipes %}
    <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center mb-2 auth-card border-0 shadow-sm p-3" style="margin-top: 0;">
        <div>
            <h5 class="mb-1 fw-bold">{{ r.title }} {% if not r.is_public %}<span class="badge bg-secondary">私密</span>{% endif %}</h5>
            <small class="text-muted">{{ r.created_at }}</small>
        </div>
        <div class="d-flex gap-2">
            <a href="{{ url_for('recipe.detail', id=r.id) }}" class="btn btn-sm btn-outline-primary">檢視</a>
            <a href="{{ url_for('recipe.edit_recipe', id=r.id) }}" class="btn btn-sm btn-warning">編輯</a>
            <form action="{{ url_for('recipe.delete_recipe', id=r.id) }}" method="POST" onsubmit="return confirm('確定刪除此食譜？此操作無法復原。');">
                <button type="submit" class="btn btn-sm btn-danger">刪除</button>
            </form>
        </div>
    </div>
    {% else %}
    <p>您尚未建立任何食譜。</p>
    {% endfor %}
</div>
<div class="mt-4">
    <a href="{{ url_for('recipe.new_recipe') }}" class="btn btn-custom">➕ 新增食譜</a>
</div>
{% endblock %}
