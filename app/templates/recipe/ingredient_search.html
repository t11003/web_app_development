{% extends "base.html" %}
{% block content %}
<div class="auth-card mb-4" style="margin-top: 1vmin;">
    <h3 class="fw-bold mb-3">從食材找靈感 🍅🥚</h3>
    <p class="text-muted">打開冰箱，擁有哪些食材？輸入後我們會幫您篩選可用食譜。</p>
    <form class="d-flex gap-2" action="{{ url_for('recipe.ingredient_search') }}">
        <input type="text" name="items" class="form-control" placeholder="例: 蛋, 番茄, 蔥 (以逗號分隔)" value="{{ items|join(', ') }}" required>
        <button type="submit" class="btn btn-custom px-4">挖掘食譜</button>
    </form>
</div>
{% if items %}
<h5 class="mb-3">尋找包含 <strong class="text-danger">{{ items|join(' 和 ') }}</strong> 的結果：</h5>
<div class="row">
    {% for r in recipes %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm auth-card p-3" style="margin-top: 0;">
            <h5 class="fw-bold">{{ r.title }}</h5>
            <a href="{{ url_for('recipe.detail', id=r.id) }}" class="btn btn-outline-primary mt-auto">觀看</a>
        </div>
    </div>
    {% else %}
    <p>找不到包含該些食材的組合！</p>
    {% endfor %}
</div>
{% endif %}
{% endblock %}
