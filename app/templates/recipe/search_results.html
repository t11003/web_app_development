{% extends "base.html" %}
{% block content %}
<h3 class="mb-4 fw-bold">搜尋結果: '{{ keyword }}'</h3>
<div class="row">
    {% for r in recipes %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm border-0 auth-card p-3" style="margin-top: 0;">
            <h5 class="card-title fw-bold">{{ r.title }}</h5>
            <a href="{{ url_for('recipe.detail', id=r.id) }}" class="btn btn-outline-primary mt-auto">觀看食譜</a>
        </div>
    </div>
    {% else %}
    <p>找不到符合的食譜。</p>
    {% endfor %}
</div>
<a href="{{ url_for('recipe.index') }}" class="btn btn-link">返回首頁</a>
{% endblock %}
