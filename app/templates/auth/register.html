{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="auth-card">
            <div class="text-center mb-4">
                <h3 class="fw-bold mb-2">建立新帳號 ✨</h3>
                <p class="text-muted">加入我們，開始打造您的個人食譜庫</p>
            </div>
            
            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">設定帳號 (信箱)</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="例如：chef@example.com" required autofocus>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">設定密碼</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="至少包含 6 個字元" required>
                </div>

                <div class="mb-4">
                    <label for="confirm_password" class="form-label fw-semibold">確認密碼</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="請再次輸入密碼" required>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-custom btn-lg">免費註冊</button>
                </div>
            </form>
            
            <div class="text-center mt-4 pt-3 border-top">
                <p class="text-muted mb-0">已經有帳號了？ 
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold" style="color: var(--primary-color);">立即登入</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
